# Production profile overrides
# Activated by: SPRING_PROFILES_ACTIVE=prod (set in container environment)

# Prevent Hibernate from auto-altering the schema in production
spring.jpa.hibernate.ddl-auto=validate

# Suppress SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Docker Compose support is irrelevant in production containers
spring.docker.compose.enabled=false
