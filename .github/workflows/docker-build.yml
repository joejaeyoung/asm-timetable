name: Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./team
          file: ./team/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/asm-timetable-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/asm-timetable-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/asm-timetable-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/asm-timetable-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: DOCKERHUB_USERNAME,DB_USERNAME,DB_PASSWORD,SERVER_HOST
          script: |
            # 최신 이미지 pull
            docker pull $DOCKERHUB_USERNAME/asm-timetable-backend:latest
            docker pull $DOCKERHUB_USERNAME/asm-timetable-frontend:latest

            # 네트워크 없으면 생성
            docker network inspect asm-network >/dev/null 2>&1 || docker network create asm-network

            # 기존 컨테이너 제거
            docker stop backend frontend 2>/dev/null || true
            docker rm backend frontend 2>/dev/null || true

            # 백엔드 실행
            docker run -d \
              --name backend \
              --network asm-network \
              -p 8080:8080 \
              -e DB_HOST=mysql \
              -e DB_USERNAME=$DB_USERNAME \
              -e DB_PASSWORD=$DB_PASSWORD \
              -e FRONTEND_URL=http://$SERVER_HOST \
              --restart unless-stopped \
              $DOCKERHUB_USERNAME/asm-timetable-backend:latest

            # 프론트엔드 실행
            docker run -d \
              --name frontend \
              --network asm-network \
              -p 80:80 \
              --restart unless-stopped \
              $DOCKERHUB_USERNAME/asm-timetable-frontend:latest

            # 오래된 이미지 정리
            docker image prune -f
